name: Publish CLI to npm

on:
  workflow_dispatch: # run the test matrix on demand (publish still requires a tag)
  push:
    tags:
      - "cli-v*" # Trigger on tags like cli-v0.1.0, cli-v1.0.0

permissions:
  contents: write # For creating GitHub Releases
  id-token: write # npm provenance

jobs:
  test:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/cli

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: [18, 20, 22]
        include:
          # Windows coverage on the LTS line only (issue #113).
          - os: windows-latest
            node-version: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run tests
        run: node --test

  publish:
    needs: test
    # Event-scoped: a workflow_dispatch (even one targeting a tag ref) runs
    # tests only; publishing requires an actual tag push.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 18
          registry-url: https://registry.npmjs.org

      - name: Verify package version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#cli-v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "VERSION=$PKG_VERSION" >> "$GITHUB_ENV"

      - name: Verify CHANGELOG has an entry for this version
        run: |
          if ! grep -qE "^## \[$VERSION\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$VERSION]' section — move the Unreleased notes into a release section before tagging"
            exit 1
          fi

      - name: Syntax check
        run: |
          for f in $(find bin src -name '*.mjs'); do
            node --check "$f" || exit 1
          done
          echo "All files passed syntax check"

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Release body = Install section + Highlights from the annotated tag
      # message (git tag -a cli-vX.Y.Z -m "- bullet"), if any, + auto-generated
      # notes. Lightweight tags simply get no Highlights section.
      - name: Compose release notes
        run: |
          NOTES="$RUNNER_TEMP/release-notes.md"
          {
            echo '## Install'
            echo ''
            echo '```bash'
            echo '# One-liner'
            echo 'curl -fsSL https://qveris.ai/cli/install | bash'
            echo ''
            echo '# Or via npm'
            echo "npm install -g @qverisai/cli@${VERSION}"
            echo '```'
          } > "$NOTES"
          # actions/checkout maps the tag ref to the bare commit, dropping the
          # annotation (actions/checkout#882) — re-fetch the real tag object.
          git fetch --force --depth=1 origin "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}" \
            || echo "::warning::Could not re-fetch tag ${GITHUB_REF_NAME}; Highlights may be omitted"
          if [ "$(git cat-file -t "refs/tags/${GITHUB_REF_NAME}" 2>/dev/null)" = "tag" ]; then
            HIGHLIGHTS="$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME" \
              | sed -e '/^-----BEGIN PGP SIGNATURE-----$/,$d' -e '/^-----BEGIN SSH SIGNATURE-----$/,$d')"
            if [ -n "$HIGHLIGHTS" ]; then
              printf '\n## Highlights\n\n%s\n' "$HIGHLIGHTS" >> "$NOTES"
            fi
          fi
          printf '\nSee [README](packages/cli/README.md) for usage.\n' >> "$NOTES"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "QVeris CLI v${{ env.VERSION }}"
          body_path: ${{ runner.temp }}/release-notes.md
          generate_release_notes: true
