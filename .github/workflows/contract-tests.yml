name: Contract tests

# Issue #37 phase 3 (#47): enforce, on every PR, that the CLI's API calls and
# the Python SDK's consumed models stay aligned with the website-mirrored
# public OpenAPI contract. The cli/python *-publish workflows only run on
# release tags, so without this the contract guards would not gate PRs.

on:
  pull_request:
    paths:
      - "docs/openapi/**"
      - "packages/cli/src/**"
      - "packages/cli/test/openapi-contract.test.mjs"
      - "packages/python-sdk/qveris/**"
      - "packages/python-sdk/tests/test_openapi_contract.py"
      - "packages/js-sdk/src/**"
      - "packages/mcp/src/**"
      - "packages/mcp/package.json"
      - "packages/mcp/package-lock.json"
      - "packages/mcp/tsconfig.json"
      - "packages/openclaw-qveris-plugin/**"
      - ".github/workflows/contract-tests.yml"
  push:
    branches:
      - main
    paths:
      - "docs/openapi/**"
      - "packages/cli/src/**"
      - "packages/cli/test/openapi-contract.test.mjs"
      - "packages/python-sdk/qveris/**"
      - "packages/python-sdk/tests/test_openapi_contract.py"
      - "packages/js-sdk/src/**"
      - "packages/mcp/src/**"
      - "packages/mcp/package.json"
      - "packages/mcp/package-lock.json"
      - "packages/mcp/tsconfig.json"
      - "packages/openclaw-qveris-plugin/**"
      - ".github/workflows/contract-tests.yml"

permissions:
  contents: read

jobs:
  cli-contract:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: CLI tests (full suite, includes the OpenAPI contract test)
        working-directory: packages/cli
        run: node --test

  python-contract:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: packages/python-sdk/uv.lock
      - name: Python SDK tests (full suite, includes the contract tests)
        working-directory: packages/python-sdk
        run: uv run --extra dev pytest -q

  js-sdk-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/js-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: packages/js-sdk/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: JS SDK client tests
        run: npm test

  mcp-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: packages/mcp/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: MCP server tests
        run: npm test

  openclaw-plugin-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/openclaw-qveris-plugin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: packages/openclaw-qveris-plugin/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Plugin tests
        run: npm test
      - name: Verify npm package contents
        run: npm run check:pack
