name: Publish Python SDK to PyPI

on:
  workflow_dispatch: # run the test matrix on demand (publish still requires a tag)
  push:
    tags:
      - "python-sdk-v*" # Trigger on tags like python-sdk-v0.1.0, python-sdk-v1.0.0

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/python-sdk

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
        include:
          # Windows coverage on one interpreter only (issue #113).
          - os: windows-latest
            python-version: "3.11"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: packages/python-sdk/uv.lock

      - name: Run tests
        run: uv run --extra dev pytest

      - name: Compile package and examples
        run: uv run python -m compileall qveris examples

  publish:
    needs: test
    # Event-scoped: a workflow_dispatch (even one targeting a tag ref) runs
    # tests only; publishing requires an actual tag push.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write # For creating GitHub Releases
      id-token: write # For PyPI trusted publishing
    defaults:
      run:
        working-directory: packages/python-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: packages/python-sdk/uv.lock

      - name: Verify package version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#python-sdk-v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi
          echo "VERSION=$PKG_VERSION" >> "$GITHUB_ENV"

      - name: Verify CHANGELOG has an entry for this version
        run: |
          if ! grep -qE "^## \[$VERSION\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$VERSION]' section — move the Unreleased notes into a release section before tagging"
            exit 1
          fi

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python-sdk/dist
          password: ${{ secrets.PYPI_API_TOKEN }}

      # Release body = Install section + Highlights from the annotated tag
      # message (git tag -a python-sdk-vX.Y.Z -m "- bullet"), if any, +
      # auto-generated notes. Lightweight tags simply get no Highlights section.
      - name: Compose release notes
        run: |
          NOTES="$RUNNER_TEMP/release-notes.md"
          {
            echo '## Install'
            echo ''
            echo '```bash'
            echo "pip install qveris==${VERSION}"
            echo '```'
          } > "$NOTES"
          # actions/checkout maps the tag ref to the bare commit, dropping the
          # annotation (actions/checkout#882) — re-fetch the real tag object.
          git fetch --force --depth=1 origin "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}" \
            || echo "::warning::Could not re-fetch tag ${GITHUB_REF_NAME}; Highlights may be omitted"
          if [ "$(git cat-file -t "refs/tags/${GITHUB_REF_NAME}" 2>/dev/null)" = "tag" ]; then
            HIGHLIGHTS="$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME" \
              | sed -e '/^-----BEGIN PGP SIGNATURE-----$/,$d' -e '/^-----BEGIN SSH SIGNATURE-----$/,$d')"
            if [ -n "$HIGHLIGHTS" ]; then
              printf '\n## Highlights\n\n%s\n' "$HIGHLIGHTS" >> "$NOTES"
            fi
          fi
          printf '\nSee [README](packages/python-sdk/README.md) for usage.\n' >> "$NOTES"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "QVeris Python SDK v${{ env.VERSION }}"
          body_path: ${{ runner.temp }}/release-notes.md
          generate_release_notes: true
