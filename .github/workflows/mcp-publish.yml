name: Publish MCP to npm

on:
  push:
    tags:
      - "mcp-v*" # Trigger on tags like mcp-v0.1.3, mcp-v1.0.0

permissions:
  contents: write # For creating GitHub Releases

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mcp

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: packages/mcp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  publish:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mcp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Verify package version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#mcp-v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "VERSION=$PKG_VERSION" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Release body = Install section + Highlights from the annotated tag
      # message (git tag -a mcp-vX.Y.Z -m "- bullet"), if any, + auto-generated
      # notes. Lightweight tags simply get no Highlights section.
      - name: Compose release notes
        run: |
          NOTES="$RUNNER_TEMP/release-notes.md"
          {
            echo '## Install'
            echo ''
            echo '```bash'
            echo "npx -y @qverisai/mcp@${VERSION}"
            echo '```'
          } > "$NOTES"
          if [ "$(git cat-file -t "refs/tags/${GITHUB_REF_NAME}" 2>/dev/null)" = "tag" ]; then
            HIGHLIGHTS="$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME")"
            if [ -n "$HIGHLIGHTS" ]; then
              printf '\n## Highlights\n\n%s\n' "$HIGHLIGHTS" >> "$NOTES"
            fi
          fi
          printf '\nSee [README](packages/mcp/README.md) for configuration.\n' >> "$NOTES"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "QVeris MCP Server v${{ env.VERSION }}"
          body_path: ${{ runner.temp }}/release-notes.md
          generate_release_notes: true
