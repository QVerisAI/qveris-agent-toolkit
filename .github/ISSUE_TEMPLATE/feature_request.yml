name: Feature request
description: Propose an improvement to the toolkit
labels: ["enhancement"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package / area
      options:
        - "@qverisai/cli"
        - "@qverisai/mcp"
        - "@qverisai/sdk (JS)"
        - "qveris (Python SDK)"
        - "OpenClaw plugin"
        - "framework adapters"
        - "docs / skills / recipes"
        - "cross-cutting"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do that's hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
