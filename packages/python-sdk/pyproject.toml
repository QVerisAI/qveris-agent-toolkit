[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "qveris"
version = "0.3.2"
description = "QVeris Python SDK for agent capability discovery, calling, and audit"
requires-python = ">=3.8"
license = "MIT"
authors = [
    { name = "QVeris Team", email = "contact@qveris.ai" },
]
dependencies = [
    "httpx>=0.25.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "openai>=1.0.0",  # Default provider
]

[project.optional-dependencies]
# langchain-core requires Python >=3.9; the marker keeps the package resolvable
# on 3.8 (the integration and its tests are simply unavailable there).
langchain = [
    "langchain-core>=0.3.0; python_version >= '3.9'",
]
# openai-agents requires Python >=3.10; the marker keeps the package resolvable
# on older interpreters (the integration and its tests are unavailable there).
openai-agents = [
    "openai-agents>=0.1.0; python_version >= '3.10'",
]
# crewai requires Python >=3.10; heavy dep tree, so it is intentionally NOT in
# `dev` — its integration test is importorskip-gated and run against an
# on-demand install.
crewai = [
    "crewai>=0.80.0; python_version >= '3.10'",
]
# OpenTelemetry tracing for discover/inspect/call. Only the API is needed; bring
# your own SDK + exporter in the app. Absent this extra, tracing is a no-op.
otel = [
    "opentelemetry-api>=1.20.0",
]
dev = [
    "pytest",
    "pytest-cov",
    "ruff>=0.8.0",
    "pytest-asyncio",
    "python-dotenv",
    "rich>=13.0.0",
    "langchain-core>=0.3.0; python_version >= '3.9'",  # for the LangChain integration tests
    "openai-agents>=0.1.0; python_version >= '3.10'",  # for the OpenAI Agents integration tests
    "opentelemetry-api>=1.20.0",  # for the observability tests
    "opentelemetry-sdk>=1.20.0",  # in-memory span exporter used by the tests
    # Pinned so regenerated models stay byte-stable with the checked-in
    # qveris/generated/openapi_models.py and the drift CI (issue #37 phase 2).
    "datamodel-code-generator==0.26.3",
]

[project.urls]
Changelog = "https://github.com/QVerisAI/qveris-agent-toolkit/blob/main/packages/python-sdk/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["qveris"]

# Ship the changelog in the wheel too (most users install the wheel, not the
# sdist); it lands as qveris/CHANGELOG.md in site-packages.
[tool.hatch.build.targets.wheel.force-include]
"CHANGELOG.md" = "qveris/CHANGELOG.md"

[tool.ruff]
line-length = 120
target-version = "py38"
# Never touch generated artifacts: they must stay byte-identical to what the
# pinned generator produces (the regen-and-diff CI enforces this).
exclude = ["qveris/generated"]

[tool.ruff.lint]
# Correctness-focused start: pycodestyle errors, pyflakes, and bugbear-free
# basics. Import sorting and broader style rules can tighten later.
select = ["E", "F", "W"]
ignore = [
    "E501", # line length is advisory here; formatter handles the hard cases
]

[tool.ruff.format]
# Matches the existing style (double quotes, 4-space indents).
quote-style = "double"
