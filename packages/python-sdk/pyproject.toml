[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "qveris"
version = "0.2.0"
description = "QVeris Python SDK for agent capability discovery, calling, and audit"
requires-python = ">=3.8"
license = "MIT"
authors = [
    { name = "QVeris Team", email = "contact@qveris.ai" },
]
dependencies = [
    "httpx>=0.25.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "openai>=1.0.0",  # Default provider
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "python-dotenv",
    "rich>=13.0.0",
    # Pinned so regenerated models stay byte-stable with the checked-in
    # qveris/generated/openapi_models.py and the drift CI (issue #37 phase 2).
    "datamodel-code-generator==0.26.3",
]

[tool.hatch.build.targets.wheel]
packages = ["qveris"]
